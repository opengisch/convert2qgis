name: Continuous integration

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  code_check:
    name: Code check
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'

      - name: Install formatter
        run: pip install pre_commit

      - name: Check format
        run: python -m pre_commit run --all-files

  unit_tests:
    name: Unit tests - QGIS:${{ matrix.qgis-tag }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        qgis-tag: ["3.40", "3.44", "ltr"]

    container:
      image: qgis/qgis:${{ matrix.qgis-tag }}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          # using `--system-site-packages` gives access to qgis and other system libraries
          uv venv --system-site-packages
          uv sync --group dev --extra optional

      - name: Run tests
        run: uv run pytest
